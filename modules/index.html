const MODULES = [
  { num: 1, slug: "module-1", title: "Introduction to Quality & Important Concepts", weeks: "2 weeks", videos: MODULE_1_VIDEOS, slideUrl: MODULE_1_SLIDE_URL, quiz: MODULE_1_QUIZ_QUESTIONS },

  { num: 3, slug: "module-3", title: "Healthcare Data Analytics (SPC)", weeks: "2 weeks", videos: MODULE_3_VIDEOS, slideUrl: MODULE_3_SLIDE_URL, quiz: MODULE_3_QUIZ_QUESTIONS },

  { num: 5, slug: "module-5", title: "Accreditation & Regulation", weeks: "1 week", videos: MODULE_5_VIDEOS, slideUrl: MODULE_5_SLIDE_URL, quiz: MODULE_5_QUIZ_QUESTIONS },
  { num: 6, slug: "module-6", title: "Risk Management, Financial Management & Utilization Management", weeks: "2 weeks", videos: MODULE_6_VIDEOS, slideUrl: MODULE_6_SLIDE_URL, quiz: MODULE_6_QUIZ_QUESTIONS },
  { num: 7, slug: "module-7", title: "Performance Improvement & Information Management", weeks: "2 to 2.5 weeks", videos: MODULE_7_VIDEOS, slideUrl: MODULE_7_SLIDE_URL, quiz: MODULE_7_QUIZ_QUESTIONS },
  { num: 8, slug: "module-8", title: "Population Health and Care Transitions", weeks: "1 week", videos: MODULE_8_VIDEOS, slideUrl: MODULE_8_SLIDE_URL, quiz: MODULE_8_QUIZ_QUESTIONS },
  { num: 9, slug: "module-9", title: "Quality Review & Accountability", weeks: "1 week", videos: MODULE_9_VIDEOS, slideUrl: MODULE_9_SLIDE_URL, quiz: MODULE_9_QUIZ_QUESTIONS },
  { num: 10, slug: "module-10", title: "Healthcare Delivery Systems", weeks: "0.5 week", videos: MODULE_10_VIDEOS, slideUrl: MODULE_10_SLIDE_URL, quiz: MODULE_10_QUIZ_QUESTIONS }
];

const grid = document.getElementById('moduleGrid');
MODULES.forEach(m=>{
  const hasContent = (m.videos && m.videos.length) || (m.slideUrl && m.slideUrl.trim()) || (m.quiz && m.quiz.length);
  const el = document.createElement('a');
  el.className = 'module-row' + (hasContent ? '' : ' locked');
  el.href = m.slug + '.html';
  el.innerHTML = `
    <div class="module-num">${String(m.num).padStart(2,'0')}</div>
    <div class="module-info">
      <div class="mtt">${m.title}</div>
      <div class="mdd">${m.weeks}${hasContent ? ' · Recordings · Slides · Quiz' : ' · Not yet uploaded'}</div>
    </div>
    <div class="module-status ${hasContent ? 'live' : 'soon'}">${hasContent ? 'Available' : 'Coming Soon'}</div>
  `;
  grid.appendChild(el);
});
</script>
