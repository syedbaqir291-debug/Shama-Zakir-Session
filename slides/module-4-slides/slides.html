<script src="slide-link.js"></script>
<script>
function extractSlidesId(url){
  if(!url) return '';
  let m = url.match(/\/presentation\/d\/([a-zA-Z0-9_-]+)/);
  return m ? m[1] : url.trim();
}
const area = document.getElementById('slidesArea');
const RAW_URL = (typeof MODULE_4_SLIDE_URL !== 'undefined') ? MODULE_4_SLIDE_URL : '';
if(!RAW_URL || !RAW_URL.trim()){
  area.innerHTML = '<div class="empty-state">📑 Slides for this module haven\'t been uploaded yet — check back soon.</div>';
} else {
  const id = extractSlidesId(RAW_URL);
  area.innerHTML = `
    <div class="slides-wrap">
      <div class="slides-frame-wrap">
        <iframe src="https://docs.google.com/presentation/d/${id}/embed?start=false&loop=false&delayms=3000" allowfullscreen></iframe>
      </div>
      <a class="slides-open-link" href="https://docs.google.com/presentation/d/${id}/edit?usp=drive_link" target="_blank" rel="noopener">Open in Google Slides ↗</a>
    </div>
  `;
}
</script>
