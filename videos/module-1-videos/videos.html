<body>
<div class="omac-badge">OMAC Web Developer</div>

    <div class="brand-name"><b>Module 1</b> · Pro-Frontier</div>

</div>

<div class="page-head">
  <div class="page-eyebrow">Module 1 of 10 · Class Recordings</div>
  <div class="page-title">Introduction to Quality &amp; Important Concepts</div>
</div>

<div class="video-grid" id="videoGrid"></div>

<footer class="f">Pro-Frontier International Online Academy · CPHQ Module © 2026<br><span>Web Developed by <b>OMAC Developer</b> · S M Baqir</span></footer>

<script src="video-links.js"></script>
<script>
const grid = document.getElementById('videoGrid');
const VIDEOS = (typeof MODULE_1_VIDEOS !== 'undefined') ? MODULE_1_VIDEOS : [];
if(!VIDEOS.length){
  grid.innerHTML = '<div class="empty-state">🎬 Recordings for this module haven\'t been uploaded yet — check back soon.</div>';
} else {
  VIDEOS.forEach((v,i)=>{
    const card = document.createElement('div');
    card.className = 'video-card';
    card.innerHTML = `
      <div class="vc-top">
        <div class="vc-part">PART ${v.part || i+1} OF ${VIDEOS.length}</div>
        <div class="vc-dur">~1.5 hrs</div>
      </div>
      <div class="vc-title">${v.title || ('Part ' + (v.part || i+1))}</div>
      <a class="btn btn-teal" href="${v.url}" target="_blank" rel="noopener">▶ Open Video</a>
    `;
    grid.appendChild(card);
  });
}
</script>
</body>
