<script src="video-links.js"></script>
<script>
function extractDriveId(url){
  if(!url) return '';
  let m = url.match(/\/d\/([a-zA-Z0-9_-]+)/);
  if(m) return m[1];
  m = url.match(/[?&]id=([a-zA-Z0-9_-]+)/);
  if(m) return m[1];
  return url.trim();
}
const grid = document.getElementById('videoGrid');
const VIDEOS = (typeof MODULE_6_VIDEOS !== 'undefined') ? MODULE_6_VIDEOS : [];
if(!VIDEOS.length){
  grid.innerHTML = '<div class="empty-state">🎬 Recordings for this module haven\'t been uploaded yet — check back soon.</div>';
} else {
  VIDEOS.forEach((v,i)=>{
    const id = extractDriveId(v.url);
    const card = document.createElement('div');
    card.className = 'video-card';
    card.innerHTML = `
      <div class="vc-top">
        <div class="vc-part">PART ${v.part || i+1} OF ${VIDEOS.length}</div>
        <div class="vc-dur">~1.5 hrs</div>
      </div>
      <div class="vc-title">${v.title || ('Part ' + (v.part || i+1))}</div>
      <div class="video-frame-wrap">
        <iframe src="https://drive.google.com/file/d/${id}/preview" allow="autoplay" allowfullscreen></iframe>
      </div>
    `;
    grid.appendChild(card);
  });
}
</script>
