<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Study Notes | CPHQ · Pro-Frontier</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,500&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/theme.css">
<style>
  .book-card{
    margin:16px 22px; background:var(--ink-2); border:1px solid var(--line);
    border-radius:18px; padding:22px; display:flex; flex-direction:column; gap:14px;
  }
  .book-card .bk-top{ display:flex; align-items:flex-start; gap:14px; }
  .book-card .bk-ic{ font-size:30px; flex-shrink:0; }
  .book-card .bk-title{ font-family:'Fraunces',serif; font-size:16.5px; font-weight:600; line-height:1.3; }
  .book-card .bk-ed{
    margin-top:5px; font-family:'JetBrains Mono',monospace; font-size:10.5px;
    color:var(--gold-soft); letter-spacing:0.05em; text-transform:uppercase;
  }
</style>
</head>
<body>
<script>if(!sessionStorage.getItem('cphq_logged_in')){ window.location.href = 'index.html'; }</script>

<div class="topbar">
  <div class="brand">
    <a href="index.html" class="back-btn" aria-label="Back to dashboard">←</a>
    <div class="brand-name"><b>Study Notes</b> · Pro-Frontier</div>
  </div>
</div>

<div class="page-head">
  <div class="page-eyebrow">Reference Library</div>
  <div class="page-title">Study Notes</div>
  <div class="page-sub">Two core CPHQ reference books, uploaded to Google Drive for quick access. Tap a title below to open it.</div>
</div>

<div id="bookList"></div>

<footer class="f">Pro-Frontier International Online Academy · CPHQ Module © 2026<br><span>Web Developed by <b>OMAC Developer</b> · S M Baqir</span></footer>

<script src="data/book-links.js"></script>
<script>
const BOOKS = [
  { icon: "📘", title: "Janet Brown — Healthcare Quality Handbook", edition: "30th Edition", url: (typeof BOOK_JANET_BROWN_URL !== 'undefined') ? BOOK_JANET_BROWN_URL : "" },
  { icon: "📗", title: "HQ Solutions for CPHQ", edition: "5th Edition", url: (typeof BOOK_HQ_SOLUTIONS_URL !== 'undefined') ? BOOK_HQ_SOLUTIONS_URL : "" }
];

const list = document.getElementById('bookList');
BOOKS.forEach(b=>{
  const has = b.url && b.url.trim();
  const card = document.createElement('div');
  card.className = 'book-card';
  card.innerHTML = `
    <div class="bk-top">
      <div class="bk-ic">${b.icon}</div>
      <div>
        <div class="bk-title">${b.title}</div>
        <div class="bk-ed">${b.edition}</div>
      </div>
    </div>
    ${has
      ? `<a class="btn btn-teal" href="${b.url}" target="_blank" rel="noopener">Open Book ↗</a>`
      : `<div class="empty-state" style="margin:0;">📄 Not uploaded yet — check back soon.</div>`
    }
  `;
  list.appendChild(card);
});
</script>

</body>
</html>
